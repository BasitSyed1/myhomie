name: my_homie
description: "MyHomie — a Flutter real-estate marketplace app powered by Firebase (Auth, Firestore, Realtime Database, Storage)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  firebase_storage: ^12.4.1
  cloud_firestore: ^5.6.2
  firebase_database: ^11.3.1

  # Media / device
  image_picker: ^1.1.2
  multi_image_picker_plus: ^0.0.6
  permission_handler: ^11.3.1

  # UI / utilities
  carousel_slider: ^5.0.0
  stylish_bottom_bar: ^1.1.0
  random_string: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
